name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python-version }}, extras=${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        extras: ["none", "langchain", "llamaindex"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (extras=${{ matrix.extras }})
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.extras }}" = "none" ]; then
            pip install -e ".[dev]"
          else
            pip install -e ".[dev,${{ matrix.extras }}]"
          fi
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run basic example
        run: python examples/basic.py

  bench:
    name: benchmark smoke (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run needle benchmark
        run: python -m bench.needle

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (informational)
        continue-on-error: true
        run: ruff check src tests

  secrets-scan:
    name: secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed SSL keys or .env files
        run: |
          if git ls-files | grep -E '\.(key|pem|p12|pfx)$|^\.env$|/\.env$'; then
            echo "::error::Secret file found in git tracking"
            exit 1
          fi
          echo "OK: no secret files tracked"
